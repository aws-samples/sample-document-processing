model_list:
  # Primary model - Claude Sonnet (Supervisor, Extraction, Mapping agents)
  - model_name: claude-primary
    litellm_params:
      model: bedrock/us.anthropic.claude-sonnet-4-6
      aws_region_name: us-east-1
    tpm: 200000
    rpm: 200

  # Fallback model - Claude Opus 4.5 (automatic fallback on Sonnet throttle/error)
  - model_name: claude-fallback
    litellm_params:
      model: bedrock/us.anthropic.claude-opus-4-5-20251101-v1:0
      aws_region_name: us-east-1
    tpm: 200000
    rpm: 100

  # Fast model - Claude Haiku (Chunking, Validation agents - simpler tasks)
  - model_name: claude-fast
    litellm_params:
      model: bedrock/us.anthropic.claude-haiku-4-5-20251001-v1:0
      aws_region_name: us-east-1
    tpm: 80000
    rpm: 100

router_settings:
  routing_strategy: usage-based-routing
  num_retries: 5
  retry_after: 5
  timeout: 3600
  fallbacks:
    - claude-primary:
        - claude-fallback
  context_window_fallbacks:
    - claude-primary:
        - claude-fallback
  allowed_fails: 3
  cooldown_time: 30

general_settings:
  # Note: 'master_key' is LiteLLM's required config field name for the admin API key
  master_key: os.environ/LITELLM_ADMIN_KEY
  database_url: os.environ/DATABASE_URL
  store_model_in_db: false
  max_parallel_requests: 100
  request_timeout: 3600

litellm_settings:
  drop_params: true
  set_verbose: false
  json_logs: true
  num_retries: 5
  callbacks: callbacks.metrics_logger.MetricsLogger
